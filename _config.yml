title: PHP, PDO &amp; ODBC on IBM i
description: A practical guide to running PHP on IBM i and connecting PHP applications to DB2 — including calling RPG from PHP via the Toolkit.
url: https://odbcphp.k3s.com

remote_theme: just-the-docs/just-the-docs
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Google Analytics
# ga_tracking: G-XXXXXXXXXX
# ga_tracking_anonymize_ip: true

# Navigation
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

# Top-right auxiliary links
aux_links:
  "View on GitHub":
    - "https://github.com/K3S/IBM-i-PHP-PDO-ODBC-Toolkit-Setup"
  "Sponsored by K3S":
    - "https://k3s.com"
aux_links_new_tab: true

# External links in the sidebar — cross-link the K3S tutorial network
nav_external_links:
  - title: King III Solutions
    url: https://k3s.com
    hide_icon: false
  - title: RPG Tutorial
    url: https://rpgtutorial.k3s.com
    hide_icon: false
  - title: IBM i AI Workers
    url: https://ibmi-ai-workers.k3s.com
    hide_icon: false
  - title: Action API Pattern
    url: https://action-api-pattern.k3s.com/
    hide_icon: false

# Code copy button
enable_copy_code_button: true

# Callouts (note, tip, warning, caution)
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  caution:
    title: Caution
    color: red

# Footer
footer_content: 'Maintained by <a href="https://k3s.com">King III Solutions Inc.</a> Prose licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>; code samples under <a href="https://opensource.org/licenses/MIT">MIT</a>. <a href="https://github.com/K3S/IBM-i-PHP-PDO-ODBC-Toolkit-Setup">Contribute on GitHub</a>.'

# "Edit this page on GitHub" link at the bottom of every page
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/K3S/IBM-i-PHP-PDO-ODBC-Toolkit-Setup"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep these files out of the built site
exclude:
  - README.md
  - LICENSE
  - LICENSE-PROSE
  - .github
  - vendor
  - Gemfile
  - Gemfile.lock
